spring.application.name=rbpo-backend

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/rbpodb}
spring.datasource.username=${DB_USERNAME:${USER:-rbpo}}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${SERVER_PORT:8081}

# TLS/SSL (HTTPS)
server.ssl.enabled=${SSL_ENABLED:false}
server.ssl.key-store=${SSL_KEYSTORE:classpath:keystore.jks}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:changeit}
server.ssl.key-store-type=JKS
server.ssl.key-alias=${SSL_KEY_ALIAS:rbposerver}
server.ssl.key-password=${SSL_KEY_PASSWORD:changeit}
server.ssl.protocol=TLS
server.ssl.enabled-protocols=TLSv1.2,TLSv1.3

server.error.whitelabel.enabled=false
server.error.include-message=always
server.error.include-binding-errors=always

# JWT
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidationMustBeAtLeast256BitsLong}
jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Подпись тикета лицензии (ЭЦП)
license.ticket-signature-secret=${LICENSE_TICKET_SECRET:${jwt.secret}}
license.ticket-ttl-seconds=${LICENSE_TICKET_TTL:3600}
